<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="../static/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="../static/favicon/favicon-96x96.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../static/favicon/favicon-16x16.png" />
  <title>로보독 얼굴 매트릭스 편집기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="robodog-page">
  <div class="header">
    <a href="../index.html" class="back-btn" title="메인으로 돌아가기">&lt; 메인화면</a>
    <div class="header-content">
      <h1>로보독 얼굴 매트릭스 편집기</h1>
      <p class="subtitle">로보독 좌우 매트릭스 표정을 만들고 Python 코드로 복사합니다.</p>
      <ul class="header-guide-list">
        <!-- <li><strong>읽기 모드</strong>: 현재 표정을 보기만 하고 저장 패널은 숨깁니다.</li> -->
      </ul>
    </div>
  </div>

  <div class="app-container">
    <div class="container">
      <section class="top-panel">
        <div id="sideToggle" class="side-toggle" role="group" aria-label="편집 시작">
          <button id="enterEditBtn" type="button" class="toggle-btn">편집 모드</button>
        </div>
        <div id="editModeActions" class="edit-mode-actions is-hidden" role="group" aria-label="편집 저장 및 취소">
          <button id="savePresetBtn" type="button" class="action-btn action-btn--top">저장</button>
          <button id="cancelEditBtn" type="button" class="action-btn action-btn--soft action-btn--top">취소</button>
        </div>
      </section>

      <section class="sim-view">
        <div class="face-stage" aria-live="polite">
          <div class="face-shell">
            <div class="matrix-frame matrix-frame--left">
              <div id="leftMatrix" class="matrix" role="grid" aria-label="왼쪽 8x8 LED 매트릭스"></div>
            </div>
            <div class="matrix-frame matrix-frame--right">
              <div id="rightMatrix" class="matrix" role="grid" aria-label="오른쪽 8x8 LED 매트릭스"></div>
            </div>
          </div>
        </div>
      </section>

      <section id="editorPanel" class="editor-panel is-hidden" aria-labelledby="editorPanelTitle">
        <fieldset class="panel-card panel-card--editor">
          <legend id="editorPanelTitle">예시 저장</legend>
          <label class="field-row" for="presetNameInput">
            <span>예시 이름</span>
            <input id="presetNameInput" class="text-input" type="text" maxlength="30" placeholder="예시 이름을 입력하세요" />
          </label>
          <div class="action-row">
            <div class="action-group action-group--secondary">
              <button id="deletePresetBtn" type="button" class="action-btn action-btn--soft">삭제</button>
              <button id="resetAllBtn" type="button" class="action-btn action-btn--danger">전체 초기화</button>
            </div>
          </div>
          <p id="stateHint" class="panel-hint">새 예시입니다. 이름을 입력하고 저장하면 카드가 추가됩니다.</p>
        </fieldset>
      </section>

      <section class="preset-section" aria-labelledby="presetSectionTitle">
        <div class="section-heading">
          <div>
            <h2 id="presetSectionTitle">예시 모음</h2>
            <p class="section-subtitle">왼쪽의 새로 만들기로 빈 캔버스를 열고, 저장된 예시를 다시 불러올 수 있습니다.</p>
          </div>
        </div>
        <div id="presetStrip" class="preset-strip" aria-label="예시 카드 목록"></div>
      </section>

      <section class="bottom-panel">
        <fieldset class="panel-card panel-card--code">
          <legend>Python 코드</legend>
          <div class="code-block">
            <button id="copyCodeBtn" type="button" class="copy-btn" aria-label="Python 코드 복사" title="Python 코드 복사">⧉</button>
            <pre id="codeOutput" class="code-output"></pre>
          </div>
        </fieldset>
      </section>
    </div>
  </div>

  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <div id="confirmModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="modal-header">
        <h2 id="confirmTitle">확인</h2>
      </div>
      <div class="modal-body">
        <p id="confirmMessage"></p>
      </div>
      <div class="modal-footer">
        <button id="cancelConfirmBtn" type="button" class="action-btn action-btn--soft">취소</button>
        <button id="acceptConfirmBtn" type="button" class="action-btn">확인</button>
      </div>
    </div>
  </div>

  <script src="./storage.js"></script>
  <script src="./app.js"></script>
</body>
</html>
