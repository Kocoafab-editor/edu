<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="../static/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="../static/favicon/favicon-96x96.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../static/favicon/favicon-16x16.png" />
  <title>로보독 다리 시뮬레이션</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="robodog-page">
    <div class="header">
      <a href="../index.html" class="back-btn" title="메인으로 돌아가기">&lt; 메인화면</a>
      <div class="header-content">
        <h1>로보독 다리 시뮬레이션</h1>
        <p class="subtitle">좌/우 뷰에서 앞/뒤 다리 모터 각도를 -90~90도로 조절합니다.</p>
      </div>
    </div>
  <div class="app-container">
    <div class="container">

      <main class="sim-body">
        <section class="top-panel">
          <div class="side-toggle" role="group" aria-label="Robot side">
            <button type="button" class="toggle-btn active" data-side="left">우측</button>
            <button type="button" class="toggle-btn" data-side="right">좌측</button>
          </div>
        </section>

        <section class="sim-view">
          <div id="robotStage" class="robot-stage left" aria-live="polite">
            <div class="robot">
              <div class="body"></div>
              <div class="head"></div>

              <div class="leg front">
                <div id="frontShoulderJoint" class="joint shoulder">
                  <div class="pivot"></div>
                  <div class="segment upper">
                    <div id="frontElbowJoint" class="joint elbow">
                      <div class="pivot"></div>
                      <div class="segment lower"></div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="leg rear">
                <div id="rearShoulderJoint" class="joint shoulder">
                  <div class="pivot"></div>
                  <div class="segment upper">
                    <div id="rearElbowJoint" class="joint elbow">
                      <div class="pivot"></div>
                      <div class="segment lower"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="bottom-panel">
          <fieldset class="motor-group">
            <legend>앞 다리</legend>
            <label class="control-row">
              <span>어깨</span>
              <input type="range" min="-90" max="90" step="1" value="0" data-key="frontShoulder" />
              <input type="number" min="-90" max="90" step="1" value="0" data-key="frontShoulder" />
            </label>
            <label class="control-row">
              <span>무릎</span>
              <input type="range" min="-90" max="90" step="1" value="0" data-key="frontElbow" />
              <input type="number" min="-90" max="90" step="1" value="0" data-key="frontElbow" />
            </label>
          </fieldset>

          <fieldset class="motor-group">
            <legend>뒤 다리</legend>
            <label class="control-row">
              <span>어깨</span>
              <input type="range" min="-90" max="90" step="1" value="0" data-key="rearShoulder" />
              <input type="number" min="-90" max="90" step="1" value="0" data-key="rearShoulder" />
            </label>
            <label class="control-row">
              <span>무릎</span>
              <input type="range" min="-90" max="90" step="1" value="0" data-key="rearElbow" />
              <input type="number" min="-90" max="90" step="1" value="0" data-key="rearElbow" />
            </label>
          </fieldset>
        </section>
      </main>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
