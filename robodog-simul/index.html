<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="../static/favicon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="../static/favicon/favicon-96x96.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../static/favicon/favicon-16x16.png" />
  <title>로보독 다리 시뮬레이션</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="robodog-page">
    <div class="header">
      <a href="../index.html" class="back-btn" title="메인으로 돌아가기">&lt; 메인화면</a>
      <div class="header-content">
        <h1>로보독 다리 시뮬레이션</h1>
        <p class="subtitle">좌/우 뷰에서 앞/뒤 다리 모터 각도를 조절합니다.</p>
        <ul style="list-style: none; padding-left: 0; margin-top: 0.5em;">
            <li><strong>어깨 관절</strong>: -90°(뒤로) ~ 90°(앞으로)</li>
            <li><strong>무릎 관절</strong>: -90°(뒤로) ~ 70°(앞으로)</li>
        </ul>
      </div>
    </div>
  <div class="app-container">
    <div class="container">

        <section class="top-panel">
          <div class="side-toggle" role="group" aria-label="Robot side">
            <button type="button" class="toggle-btn active" data-side="left">우측</button>
            <button type="button" class="toggle-btn" data-side="right">좌측</button>
          </div>
        </section>

        <section class="sim-view">
          <div id="robotStage" class="robot-stage left" aria-live="polite">
            <div class="robot">
              <div class="body"></div>
              <div class="head"></div>

              <div class="leg front">
                <div id="frontShoulderJoint" class="joint shoulder">
                  <div class="pivot"></div>
                  <div class="segment upper">
                    <div id="frontElbowJoint" class="joint elbow">
                      <div class="pivot"></div>
                      <div class="segment lower"></div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="leg rear">
                <div id="rearShoulderJoint" class="joint shoulder">
                  <div class="pivot"></div>
                  <div class="segment upper">
                    <div id="rearElbowJoint" class="joint elbow">
                      <div class="pivot"></div>
                      <div class="segment lower"></div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="mode-panel">
          <div class="mode-toggle" role="group" aria-label="Control mode">
            <button type="button" class="toggle-btn active" data-control-mode="angle">각도 제어</button>
            <button type="button" class="toggle-btn" data-control-mode="length">길이 제어</button>
          </div>
        </section>

        <section class="bottom-panel">
          <div class="control-panel-group is-active" data-panel="angle">
            <fieldset class="motor-group">
              <legend>앞 다리</legend>
              <label class="control-row">
                <span>어깨</span>
                <input type="range" min="-90" max="90" step="1" value="0" data-key="frontShoulder" />
                <input type="number" min="-90" max="90" step="1" value="0" data-key="frontShoulder" />
              </label>
              <label class="control-row">
                <span>무릎</span>
                <input type="range" min="-90" max="70" step="1" value="0" data-key="frontElbow" />
                <input type="number" min="-90" max="70" step="1" value="0" data-key="frontElbow" />
              </label>
            </fieldset>

            <fieldset class="motor-group">
              <legend>뒤 다리</legend>
              <label class="control-row">
                <span>어깨</span>
                <input type="range" min="-90" max="90" step="1" value="0" data-key="rearShoulder" />
                <input type="number" min="-90" max="90" step="1" value="0" data-key="rearShoulder" />
              </label>
              <label class="control-row">
                <span>무릎</span>
                <input type="range" min="-90" max="70" step="1" value="0" data-key="rearElbow" />
                <input type="number" min="-90" max="70" step="1" value="0" data-key="rearElbow" />
              </label>
            </fieldset>
          </div>

          <div class="control-panel-group" data-panel="length">
            <fieldset class="motor-group">
              <legend>앞 다리</legend>
              <label class="control-row">
                <span>다리높이</span>
                <input type="range" min="20" max="90" step="1" value="90" data-key="frontHeight" />
                <input type="number" min="20" max="90" step="1" value="90" data-key="frontHeight" />
              </label>
              <label class="control-row">
                <span>발끝앞뒤</span>
                <input type="range" min="-90" max="90" step="1" value="0" data-key="frontReach" />
                <input type="number" min="-90" max="90" step="1" value="0" data-key="frontReach" />
              </label>
            </fieldset>

            <fieldset class="motor-group">
              <legend>뒤 다리</legend>
              <label class="control-row">
                <span>다리높이</span>
                <input type="range" min="20" max="90" step="1" value="90" data-key="rearHeight" />
                <input type="number" min="20" max="90" step="1" value="90" data-key="rearHeight" />
              </label>
              <label class="control-row">
                <span>발끝앞뒤</span>
                <input type="range" min="-90" max="90" step="1" value="0" data-key="rearReach" />
                <input type="number" min="-90" max="90" step="1" value="0" data-key="rearReach" />
              </label>
            </fieldset>
          </div>
        </section>

        <section class="mode-panel">
          <div class="mode-toggle" role="group" aria-label="Code view mode">
            <button type="button" class="toggle-btn active" data-code-mode="block">블록코드</button>
            <button type="button" class="toggle-btn" data-code-mode="python">파이썬코드</button>
          </div>
        </section>

        <section class="code-panel-section">
          <div class="code-panel-group is-active" data-code-panel="block">
            <fieldset class="panel-card panel-card--code">
              <legend>블록코드</legend>
              <div id="blockCodeOutput" class="block-code-output" aria-live="polite"></div>
            </fieldset>
          </div>

          <div class="code-panel-group" data-code-panel="python">
            <fieldset class="panel-card panel-card--code">
              <legend>파이썬코드</legend>
              <div class="code-block">
                <button id="copyCodeBtn" type="button" class="copy-btn" aria-label="Python 코드 복사" title="Python 코드 복사">⧉</button>
                <pre id="pythonCodeOutput" class="code-output"></pre>
              </div>
            </fieldset>
          </div>
        </section>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
